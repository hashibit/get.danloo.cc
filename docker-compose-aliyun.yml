services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  # Backend services
  backend:
    build:
      context: .
      dockerfile: ./dockerfiles/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env.aliyun
    volumes:
      # 生产模式：只挂载必要的配置文件
      - ./backend/entrypoint.sh:/workspace/backend/entrypoint.sh:ro

  # AI Provider service
  ai-provider:
    build:
      context: .
      dockerfile: ./dockerfiles/ai-provider.Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env.aliyun
    volumes:
      # 生产模式：只挂载必要的配置文件
      - ./ai-provider/ai-provider/entrypoint.sh:/workspace/ai-provider/ai-provider/entrypoint.sh:ro

  # AI Proxy service
  ai-proxy:
    build:
      context: .
      dockerfile: ./dockerfiles/ai-proxy.Dockerfile
    ports:
      - "8091:8091"
    env_file:
      - .env.aliyun
    volumes:
      # 生产模式：只挂载必要的配置文件
      - ./ai-proxy/entrypoint.sh:/workspace/ai-proxy/entrypoint.sh:ro

  # Process service
  process:
    build:
      context: .
      dockerfile: ./dockerfiles/process.Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env.aliyun
    depends_on:
      - backend
      - ai-provider
      - ai-proxy
    volumes:
      # 生产模式：只挂载必要的配置文件
      - ./process/entrypoint.sh:/workspace/process/entrypoint.sh:ro

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../dockerfiles/frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.aliyun
    depends_on:
      - backend

  # Admin service
  admin:
    build:
      context: .
      dockerfile: ./dockerfiles/admin.Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env.aliyun
    volumes:
      # 生产模式：只挂载必要的配置文件
      - ./admin/entrypoint.sh:/workspace/admin/entrypoint.sh:ro