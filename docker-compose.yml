services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  # Nginx proxy for MinIO CORS
  nginx-minio:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx-minio.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - minio

  # Database service (must start first)
  db:
    image: mysql:9.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-danloo_root_password}
      MYSQL_DATABASE: danloo
      MYSQL_USER: danloo
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-danloo_password}
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-danloo_root_password}"]
      timeout: 20s
      retries: 10

  # MinIO S3-compatible object storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"  # Web Console
    expose:
      - "9000"  # S3 API (internal only)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/danloo-uploads --ignore-existing;
      mc mb myminio/danloo-results --ignore-existing;
      mc anonymous set none myminio/danloo-uploads;
      mc anonymous set none myminio/danloo-results;
      mc policy set readwrite myminio/danloo-uploads;
      mc policy set readwrite myminio/danloo-results;
      mc admin config set myminio api cors_allow_origin='*';
      mc admin service restart myminio;
      echo 'MinIO bucket initialization complete!';
      "

  # Backend services
  backend:
    build:
      context: .
      dockerfile: ./dockerfiles/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      # 开发模式：挂载源代码目录实现热重载
      - ./backend:/workspace/backend
      - ./common:/workspace/common

  # AI Provider service
  ai-provider:
    build:
      context: .
      dockerfile: ./dockerfiles/ai-provider.Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      # 开发模式：挂载源代码目录实现热重载
      - ./ai-provider/ai-provider:/workspace/ai-provider/ai-provider
      - ./common:/workspace/common

  # AI Proxy service
  ai-proxy:
    build:
      context: .
      dockerfile: ./dockerfiles/ai-proxy.Dockerfile
    ports:
      - "8091:8091"
    env_file:
      - .env
    depends_on:
      - minio
    volumes:
      # 开发模式：挂载源代码目录实现热重载
      - ./ai-proxy:/workspace/ai-proxy
      - ./common:/workspace/common

  # Process service
  process:
    build:
      context: .
      dockerfile: ./dockerfiles/process.Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - backend
      - ai-provider
      - ai-proxy
    volumes:
      # 开发模式：挂载源代码目录实现热重载
      - ./process:/workspace/process
      - ./common:/workspace/common

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: ../dockerfiles/frontend.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  # Admin service
  admin:
    build:
      context: .
      dockerfile: ./dockerfiles/admin.Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # 开发模式：挂载源代码目录实现热重载
      - ./admin:/workspace/admin
      - ./common:/workspace/common

volumes:
  mysql_data:
  minio_data:
