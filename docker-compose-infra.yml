services:
  # Database service (must start first)
  db:
    image: mysql:9.4
    environment:
      - MYSQL_DATABASE=danloo
      - MYSQL_USER=danloo
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "danloo", "-ppassword"]
      timeout: 20s
      retries: 10

  # MinIO S3-compatible object storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"  # Web Console
      - "9002:9000"  # S3 API (internal, proxied via nginx-minio on :9000)
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
      - MINIO_SERVER_URL=http://localhost:9000
      - MINIO_API_CORS_ALLOW_ORIGIN=*
      - MINIO_API_REQUESTS_MAX=1000
      - MINIO_API_REQUESTS_DEADLINE=10s
      - _MINIO_DEBUG=1
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/danloo-uploads --ignore-existing;
      mc mb myminio/danloo-results --ignore-existing;
      mc anonymous set none myminio/danloo-uploads;
      mc anonymous set none myminio/danloo-results;
      mc admin policy attach myminio readwrite --user minioadmin;
      mc admin config set myminio api cors_allow_origin='*';
      mc admin service restart myminio;
      echo 'MinIO bucket initialization complete!';
      "

volumes:
  mysql_data:
  minio_data:
